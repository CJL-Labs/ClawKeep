name: Build macOS App

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: keepd/go.mod

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build unsigned app bundle
        run: |
          chmod +x scripts/*.sh
          BUILD_CONFIGURATION=Release SKIP_PROTO=1 ./scripts/package.sh

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawkeep-macos-unsigned
          path: |
            dist/ClawKeep-macos-Release-unsigned.zip
            build/Build/Products/Release/ClawKeep.app
          if-no-files-found: error

  release-macos:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: clawkeep-macos-unsigned
          path: release-assets

      - name: Rename release asset
        run: mv release-assets/ClawKeep-macos-Release-unsigned.zip release-assets/ClawKeep-macos-${{ github.ref_name }}-unsigned.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/ClawKeep-macos-${{ github.ref_name }}-unsigned.zip
          generate_release_notes: true
