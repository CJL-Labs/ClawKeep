[monitor]
process_name = "openclaw-gateway"
pid_file = "~/.openclaw/gateway.pid"
host = "127.0.0.1"
port = 18789
enable_kqueue = true
enable_tcp_probe = true
tcp_probe_timeout_ms = 3000
health_command = ""
exit_grace_period_sec = 20
restart_cooldown_sec = 30
max_restart_attempts = 5

[log]
watch_paths = [
  "/tmp/openclaw/openclaw-*.log",
  "~/.openclaw/logs/gateway.log",
  "~/.openclaw/logs/gateway.err.log"
]
[agent]
default_agent = "claude"

[[agent.agents]]
name = "claude"
cli_path = "/usr/local/bin/claude"
cli_args = ["--dangerously-skip-permissions", "-p", "{{prompt}}"]
working_dir = "~/.openclaw/"
timeout_sec = 300

[[agent.agents]]
name = "codex"
cli_path = "/usr/local/bin/codex"
cli_args = ["exec", "--skip-git-repo-check", "{{prompt}}"]
working_dir = "~/.openclaw/"
timeout_sec = 300

[repair]
auto_repair = true
max_repair_attempts = 3
prompt_template = """
openclaw-gateway 进程崩溃了。
退出码: {{.ExitCode}}
崩溃时间: {{.CrashTime}}

错误日志:
{{.ErrLogTail}}

运行日志:
{{.TailLogs}}

请分析崩溃原因并修复。
"""

[notify]
notify_on = ["crash", "repair_start", "repair_success", "repair_fail", "agent_timeout"]

[notify.feishu]
enabled = false
webhook_url = ""

[notify.bark]
enabled = false
push_url = ""

[daemon]
log_level = "info"
log_dir = "~/.claw-keep/logs/"
log_retain_days = 7
