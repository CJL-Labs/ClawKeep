name: ClawKeep
options:
  minimumXcodeGenVersion: 2.45.0
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 15.0
    PRODUCT_BUNDLE_IDENTIFIER: com.clawkeep.app
    GENERATE_INFOPLIST_FILE: YES
targets:
  ClawKeep:
    type: application
    platform: macOS
    sources:
      - path: ClawKeep
    resources:
      - path: ClawKeep/Assets.xcassets
      - path: ../config.example.toml
      - path: ../keepd/keepd
    settings:
      base:
        PRODUCT_NAME: ClawKeep
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: NO
schemes:
  ClawKeep:
    build:
      targets:
        ClawKeep: all
