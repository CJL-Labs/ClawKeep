name: ClawKeep
options:
  minimumXcodeGenVersion: 2.45.0
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 15.0
    PRODUCT_BUNDLE_IDENTIFIER: com.clawkeep.app
    GENERATE_INFOPLIST_FILE: YES
packages:
  grpc-swift:
    url: https://github.com/grpc/grpc-swift.git
    exactVersion: 2.2.1
  grpc-swift-nio-transport:
    url: https://github.com/grpc/grpc-swift-nio-transport.git
    from: 1.0.0
  grpc-swift-protobuf:
    url: https://github.com/grpc/grpc-swift-protobuf.git
    from: 1.0.0
  swift-protobuf:
    url: https://github.com/apple/swift-protobuf.git
    from: 1.36.0
targets:
  ClawKeep:
    type: application
    platform: macOS
    sources:
      - path: ClawKeep
      - path: ClawKeep/Gen
    resources:
      - path: ClawKeep/Assets.xcassets
      - path: ../config.example.toml
      - path: ../keepd/keepd
    dependencies:
      - package: grpc-swift
        product: GRPCCore
      - package: grpc-swift-nio-transport
        product: GRPCNIOTransportHTTP2
      - package: grpc-swift-protobuf
        product: GRPCProtobuf
      - package: swift-protobuf
        product: SwiftProtobuf
    settings:
      base:
        PRODUCT_NAME: ClawKeep
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: NO
schemes:
  ClawKeep:
    build:
      targets:
        ClawKeep: all
