syntax = "proto3";

package sentinel.v1;

option go_package = "claw-keep/sentineld/gen/sentinel/v1;sentinelv1";

message MonitorConfig {
  string process_name = 1;
  string pid_file = 2;
  string host = 3;
  int32 port = 4;
  bool enable_kqueue = 5;
  bool enable_tcp_probe = 6;
  int32 tcp_probe_timeout_ms = 7;
  string health_command = 8;
  int32 restart_cooldown_sec = 9;
  int32 max_restart_attempts = 10;
}

message LogConfig {
  repeated string watch_paths = 1;
  string crash_archive_dir = 2;
  int32 tail_lines_on_crash = 3;
  int32 max_archive_days = 4;
}

message AgentEntry {
  string name = 1;
  string cli_path = 2;
  repeated string cli_args = 3;
  string working_dir = 4;
  int32 timeout_sec = 5;
  map<string, string> env = 6;
}

message AgentConfig {
  string default_agent = 1;
  repeated AgentEntry agents = 2;
}

message RepairConfig {
  bool auto_repair = 1;
  bool auto_restart = 2;
  string restart_command = 3;
  repeated string restart_args = 4;
  int32 max_repair_attempts = 5;
  string prompt_template = 6;
}

message FeishuConfig {
  bool enabled = 1;
  string webhook_url = 2;
  string secret = 3;
}

message BarkConfig {
  bool enabled = 1;
  string server_url = 2;
  string device_key = 3;
}

message SMTPConfig {
  bool enabled = 1;
  string host = 2;
  int32 port = 3;
  string username = 4;
  string password = 5;
  string from = 6;
  repeated string to = 7;
  bool use_tls = 8;
}

message NotifyConfig {
  repeated string notify_on = 1;
  FeishuConfig feishu = 2;
  BarkConfig bark = 3;
  SMTPConfig smtp = 4;
}

message DaemonConfig {
  string log_level = 1;
  string log_dir = 2;
  int32 log_retain_days = 3;
}

message AppConfig {
  MonitorConfig monitor = 1;
  LogConfig log = 2;
  AgentConfig agent = 3;
  RepairConfig repair = 4;
  NotifyConfig notify = 5;
  DaemonConfig daemon = 6;
}
